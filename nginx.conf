server {
    listen       8080 default_server;
    listen       [::]:8080 default_server;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # Compression
    gzip               on;
    gzip_vary          on;
    gzip_min_length    1024;
    gzip_proxied       any;
    gzip_comp_level    6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff
        font/woff2;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN" always;
    add_header X-Content-Type-Options    "nosniff"    always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection          "1; mode=block" always;

    # ─── PWA: Service Worker ───────────────────────────────────────
    # The SW file MUST never be cached so updates apply on next reload.
    # `Service-Worker-Allowed: /` lets the SW control the whole origin
    # even though it is served from /sw.js.
    # `location =` (exact match) wins over the regex `\.js$` block below.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/" always;
        expires 0;
        try_files $uri =404;
    }

    # ─── FCM: Firebase Messaging Service Worker ────────────────────
    # Same rule as /sw.js — must never be cached. Otherwise the browser
    # keeps an old version and push events go to the wrong handler.
    # The `Service-Worker-Allowed` header lets it claim the dedicated
    # FCM scope below the file's path.
    location = /firebase-messaging-sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Service-Worker-Allowed "/firebase-cloud-messaging-push-scope/" always;
        expires 0;
        try_files $uri =404;
    }

    # ─── PWA: Manifest ─────────────────────────────────────────────
    # Force the proper MIME type per the W3C spec. Do not cache long —
    # we want users to pick up brand/icon updates quickly.
    location = /manifest.webmanifest {
        types { } default_type application/manifest+json;
        add_header Cache-Control "no-cache" always;
        expires 0;
        try_files $uri =404;
    }

    # ─── Android App Links: Digital Asset Links ─────────────────────
    # The Android App Links verifier downloads this file to confirm the
    # bond between the domain (tubusexpress.com) and the Android app
    # signed with the SHA-256 fingerprint inside. Without the correct
    # Content-Type the verifier rejects it and tap-to-app falls back to
    # the chooser.
    # Caching is short — when we add the release SHA-256 the file changes
    # and we don't want CDNs to keep serving the stale debug-only version.
    location = /.well-known/assetlinks.json {
        types { } default_type application/json;
        add_header Cache-Control "public, max-age=300" always;
        try_files $uri =404;
    }

    # Hashed JS/CSS bundles are immutable
    location ~* \.(?:js|css)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Media assets
    location ~* \.(?:jpg|jpeg|gif|png|svg|webp|ico|woff|woff2|ttf|eot)$ {
        expires 1d;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # index.html must never be cached (SPA shell)
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        expires 0;
    }

    # Angular Router fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Healthcheck endpoint for Railway
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
