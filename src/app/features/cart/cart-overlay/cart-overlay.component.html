<div class="overlay-backdrop">
  <!-- Overlay chrome — same markup and styles as product-detail-page so
       both overlays feel identical. The inner CartComponent hides its own
       header when mounted here (see cart.component.html). -->
  <div class="overlay-top-bar">
    <div class="overlay-top-bar-inner">
      <button type="button" class="overlay-back-btn" (click)="close()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5 8.25 12l7.5-7.5" />
        </svg>
        <span>Volver</span>
      </button>

      <!-- Right side: cart title + items badge. Replaces the `app-cart-popover`
           slot that the product-detail overlay has here. -->
      <div class="overlay-cart-title">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" class="title-icon">
          <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 0 0-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 0 0-16.536-1.84M7.5 14.25 5.106 5.272M6 20.25a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Zm12.75 0a.75.75 0 1 1-1.5 0 .75.75 0 0 1 1.5 0Z" />
        </svg>
        <span class="title-text">Mi Carrito</span>
        @if (totalItems() > 0) {
          <span class="title-badge">{{ totalItems() }}</span>
        }
      </div>
    </div>
  </div>

  <app-cart />
</div>
