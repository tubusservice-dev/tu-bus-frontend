<div class="modal-overlay">
  <div class="modal-container">
    <div class="modal-header">
      <h2 class="modal-title">Cuenta no encontrada</h2>
      <button type="button" class="close-btn" (click)="closeModal.emit()" aria-label="Cerrar">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="modal-content">
      <div class="info-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M11.25 11.25l.041-.02a.75.75 0 011.063.852l-.708 2.836a.75.75 0 001.063.853l.041-.021M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-9-3.75h.008v.008H12V8.25z" />
        </svg>
      </div>

      <p class="message">
        No encontramos una cuenta asociada al correo
        <strong>{{ email() }}</strong>.
      </p>

      <p class="cta">¿Quieres registrarte?</p>

      <div class="actions">
        <button type="button" class="btn-secondary" (click)="closeModal.emit()">Cancelar</button>
        <button type="button" class="btn-primary" (click)="onRegisterClick()">Registrarme</button>
      </div>
    </div>
  </div>
</div>
