<div class="user-menu-container" (clickOutside)="closeMenu()">
  <!-- Botón del usuario -->
  <button
    type="button"
    class="user-btn"
    (click)="toggleMenu()"
    [attr.aria-expanded]="isMenuOpen()"
    aria-haspopup="true"
  >
    <div class="avatar-wrapper">
      <img
        [src]="userAvatar()"
        [alt]="userName()"
        class="user-avatar"
        (error)="onAvatarError($event)"
      />
      @if (userNotifService.unreadCount() > 0) {
        <span class="avatar-notif-dot"></span>
      }
    </div>
    <span class="user-name">{{ userName() }}</span>
    <!-- Icono flecha -->
    <svg
      xmlns="http://www.w3.org/2000/svg"
      fill="none"
      viewBox="0 0 24 24"
      stroke-width="2"
      stroke="currentColor"
      class="arrow-icon"
      [class.rotate-180]="isMenuOpen()"
    >
      <path stroke-linecap="round" stroke-linejoin="round" d="m19.5 8.25-7.5 7.5-7.5-7.5" />
    </svg>
  </button>

  <!-- Menú desplegable -->
  @if (isMenuOpen()) {
    <div class="dropdown-menu" role="menu">
      <div class="user-info">
        <img
          [src]="userAvatar()"
          [alt]="userName()"
          class="user-info-avatar"
          (error)="onAvatarError($event)"
        />
        <div class="user-info-details">
          <p class="user-info-name">{{ userName() }}</p>
          <p class="user-info-email">{{ userEmail() }}</p>
        </div>
      </div>

      <div class="menu-divider"></div>

      <nav class="menu-nav">
        <a routerLink="/perfil" class="menu-item" [class.active]="isActive('/perfil')" role="menuitem" (click)="closeMenu()">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="menu-icon">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
          </svg>
          Mi Perfil
        </a>
        <a routerLink="/perfil" fragment="garaje" class="menu-item" [class.active]="isActive('/perfil', 'garaje')" role="menuitem" (click)="closeMenu()">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="menu-icon">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.25 18.75a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h6m-9 0H3.375a1.125 1.125 0 0 1-1.125-1.125V14.25m17.25 4.5a1.5 1.5 0 0 1-3 0m3 0a1.5 1.5 0 0 0-3 0m3 0h1.125c.621 0 1.129-.504 1.09-1.124a17.902 17.902 0 0 0-3.213-9.193 2.056 2.056 0 0 0-1.58-.86H14.25M16.5 18.75h-2.25m0-11.177v-.958c0-.568-.422-1.048-.987-1.106a48.554 48.554 0 0 0-10.026 0 1.106 1.106 0 0 0-.987 1.106v7.635m12-6.677v6.677m0 4.5v-4.5m0 0h-12" />
          </svg>
          Mi Garaje
        </a>
        <a routerLink="/perfil" fragment="pedidos" class="menu-item" [class.active]="isActive('/perfil', 'pedidos')" role="menuitem" (click)="closeMenu()">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="menu-icon">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 1 0-7.5 0v4.5m11.356-1.993 1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 0 1-1.12-1.243l1.264-12A1.125 1.125 0 0 1 5.513 7.5h12.974c.576 0 1.059.435 1.119 1.007ZM8.625 10.5a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm7.5 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Z" />
          </svg>
          Mis Pedidos
        </a>
        <!-- Notifications (solo mobile) -->
        <div class="mobile-only">
          <a routerLink="/perfil" fragment="notificaciones" class="menu-item" [class.active]="isActive('/perfil', 'notificaciones')" role="menuitem" (click)="closeMenu()">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="menu-icon">
              <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 5.454-1.31A8.967 8.967 0 0 1 18 9.75V9A6 6 0 0 0 6 9v.75a8.967 8.967 0 0 1-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 0 1-5.714 0m5.714 0a3 3 0 1 1-5.714 0" />
            </svg>
            Notificaciones
            @if (userNotifService.unreadCount() > 0) {
              <span class="notif-badge">{{ userNotifService.unreadCount() }}</span>
            }
          </a>
        </div>
      </nav>

      <!-- Push notifications permission toggle (web + móvil) -->
      <div class="menu-push-toggle">
        <app-push-permission-toggle
          [enabled]="userNotifService.hasFcmToken()"
          [permission]="userNotifService.permissionState()"
          label="Notificaciones del navegador"
          description="Recibe avisos del sistema operativo cuando hay cambios en tus pedidos."
          (activate)="enablePushNotifications()"
          (deactivate)="disablePushNotifications()"
        />
      </div>

      <!-- Theme toggle (solo mobile) -->
      <div class="mobile-theme-toggle">
        <button type="button" class="menu-item theme-toggle-item" role="menuitem" (click)="themeService.toggleTheme()">
          @if (themeService.isDark()) {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="menu-icon">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
            </svg>
            Modo Claro
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="menu-icon">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
            </svg>
            Modo Oscuro
          }
        </button>
      </div>

      <div class="menu-divider"></div>

      <button type="button" class="logout-btn" role="menuitem" (click)="requestLogout()">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="menu-icon">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
        </svg>
        Cerrar Sesión
      </button>
    </div>
  }
</div>

<!-- Logout confirmation modal -->
@if (showLogoutModal()) {
  <div class="logout-overlay" (click)="cancelLogout()">
    <div class="logout-modal" (click)="$event.stopPropagation()">
      <div class="logout-modal-icon">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 9V5.25A2.25 2.25 0 0 0 13.5 3h-6a2.25 2.25 0 0 0-2.25 2.25v13.5A2.25 2.25 0 0 0 7.5 21h6a2.25 2.25 0 0 0 2.25-2.25V15m3 0 3-3m0 0-3-3m3 3H9" />
        </svg>
      </div>
      <h3 class="logout-modal-title">Cerrar Sesión</h3>
      <p class="logout-modal-text">¿Estás seguro que deseas cerrar tu sesión?</p>
      <div class="logout-modal-actions">
        <button type="button" class="logout-modal-cancel" (click)="cancelLogout()">Cancelar</button>
        <button type="button" class="logout-modal-confirm" (click)="confirmLogout()">Cerrar Sesión</button>
      </div>
    </div>
  </div>
}
