<div class="modal-overlay">
  <div class="modal-container">
    <div class="modal-header">
      <h2 class="modal-title">Recuperar contraseña</h2>
      <button type="button" class="close-btn" (click)="closeModal.emit()" aria-label="Cerrar">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
        </svg>
      </button>
    </div>

    <div class="modal-content">
      <p class="description">
        Ingresa tu correo electrónico y te enviaremos un enlace para restablecer tu contraseña.
      </p>

      @if (errorMessage()) {
        <div class="error-alert">
          <span>{{ errorMessage() }}</span>
        </div>
      }

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="auth-form">
        <div class="form-group">
          <label for="forgot-email" class="form-label">Correo Electrónico</label>
          <input
            type="email"
            id="forgot-email"
            formControlName="email"
            class="form-input"
            [class.error]="hasError('email')"
            placeholder="tu@email.com"
            autocomplete="email"
          />
          @if (hasError('email')) {
            <span class="field-error">{{ getErrorMessage('email') }}</span>
          }
        </div>

        <button type="submit" class="submit-btn" [disabled]="isLoading()">
          @if (isLoading()) {
            <span class="spinner"></span> Enviando...
          } @else {
            Enviar enlace de recuperación
          }
        </button>
      </form>
    </div>
  </div>
</div>
