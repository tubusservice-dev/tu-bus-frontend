<div
  class="searchable-select"
  [class.invalid]="invalid"
  role="combobox"
  [attr.aria-expanded]="showDropdown()"
  [attr.aria-label]="ariaLabel"
>
  @if (_selected(); as sel) {
    <div class="selected-wrap">
      <span class="chip" [attr.data-variant]="chipVariant">
        <span class="chip-label">{{ sel.label }}</span>
        <button
          type="button"
          class="chip-remove"
          aria-label="Quitar selección"
          (click)="clear()"
        >
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12" />
          </svg>
        </button>
      </span>
    </div>
  } @else {
    <div class="input-wrap">
      <input
        type="text"
        class="search-input"
        [placeholder]="placeholder"
        [value]="searchTerm()"
        (input)="onSearch($event)"
        (focus)="openDropdown()"
        autocomplete="off"
      />
      <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" aria-hidden="true">
        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
      </svg>
    </div>

    @if (showDropdown() && filtered().length > 0) {
      <div class="dropdown" role="listbox">
        @for (opt of filtered(); track opt.id) {
          <button
            type="button"
            class="option"
            role="option"
            (click)="select(opt)"
          >
            {{ opt.label }}
          </button>
        }
      </div>
    }

    @if (showDropdown() && searchTerm() && filtered().length === 0) {
      <div class="dropdown">
        <div class="no-results">{{ emptyMessage }}</div>
      </div>
    }
  }
</div>
