<div class="main-layout">
  <!-- Header TuBus (oculto durante el flujo de checkout en cualquier
       viewport — cada paso renderiza su propio `app-checkout-header`). -->
  <app-tubus-header [class.hide-on-checkout]="isCheckoutFlow()" />

  <!-- Contenido principal -->
  <main class="main-content" [class.checkout-flow]="isCheckoutFlow()">
    <router-outlet />
  </main>

  <!-- Footer -->
  <app-footer [minimal]="isCheckoutFlow()" />
</div>
