<div class="tubus-layout">
  <!-- Header -->
  <app-tubus-header />

  <!-- Contenido principal -->
  <main class="tubus-main">
    <!-- Hero Section -->
    <app-tubus-hero />

    <!-- Servicios Section -->
    <app-tubus-services />

    <!-- Combos Section -->
    <app-tubus-combos />

    <!-- Marcas Section -->
    <app-tubus-brands />

    <!-- Beneficios Section -->
    <app-tubus-benefits />

    <!-- Contacto Section -->
    <app-tubus-contact />
  </main>

  <!-- Footer -->
  <app-footer [landingMode]="true" />
</div>

<!-- Botón scroll to top -->
@if (showScrollTop()) {
  <button
    type="button"
    class="scroll-top-btn"
    aria-label="Volver arriba"
    (click)="scrollToTop()"
  >
    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 15.75l7.5-7.5 7.5 7.5" />
    </svg>
  </button>
}
