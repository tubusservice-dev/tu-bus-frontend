<!-- Banner promocional -->
<div class="hero-banner">
  <picture>
    <source media="(max-width: 767px)" srcset="assets/img/banner-movil.jpg" />
    <source media="(max-width: 1023px)" srcset="assets/img/banner-tablet.jpg" />
    <img src="assets/img/banner-web.jpg" alt="Banner promocional" class="hero-banner-img" />
  </picture>
</div>

<section class="hero">
  <!-- Background decorativo -->
  <div class="hero-bg">
    <div class="hero-bg-gradient"></div>
    <div class="hero-bg-pattern"></div>
  </div>

  <div class="hero-container">
    <div class="hero-content">
      <!-- Título -->
      <h1 class="hero-title">
        {{ hero.title }}
        <span class="hero-title-accent">{{ hero.titleAccent }}</span>
      </h1>

      <!-- Descripción -->
      <p class="hero-description">
        {{ hero.description }}
      </p>

      <!-- Promo Banner -->
      <div class="promo-banner">
        <div class="promo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904 9 18.75l-.813-2.846a4.5 4.5 0 0 0-3.09-3.09L2.25 12l2.846-.813a4.5 4.5 0 0 0 3.09-3.09L9 5.25l.813 2.846a4.5 4.5 0 0 0 3.09 3.09L15.75 12l-2.846.813a4.5 4.5 0 0 0-3.09 3.09ZM18.259 8.715 18 9.75l-.259-1.035a3.375 3.375 0 0 0-2.455-2.456L14.25 6l1.036-.259a3.375 3.375 0 0 0 2.455-2.456L18 2.25l.259 1.035a3.375 3.375 0 0 0 2.456 2.456L21.75 6l-1.035.259a3.375 3.375 0 0 0-2.456 2.456ZM16.894 20.567 16.5 21.75l-.394-1.183a2.25 2.25 0 0 0-1.423-1.423L13.5 18.75l1.183-.394a2.25 2.25 0 0 0 1.423-1.423l.394-1.183.394 1.183a2.25 2.25 0 0 0 1.423 1.423l1.183.394-1.183.394a2.25 2.25 0 0 0-1.423 1.423Z" />
          </svg>
        </div>
        <div class="promo-content">
          <span class="promo-text">
            <strong>Mano de Obra Gratis</strong> al comprar el combo (Aceite + Filtro)
          </span>
          <span class="promo-disclaimer">*No aplica para insumos traidos por el cliente</span>
        </div>
      </div>

      <!-- CTAs -->
      <div class="hero-actions">
        <button class="btn-primary" (click)="goToCatalog()">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="m21 7.5-9-5.25L3 7.5m18 0-9 5.25m9-5.25v9l-9 5.25M3 7.5l9 5.25M3 7.5v9l9 5.25m0-9v9" />
          </svg>
          {{ hero.ctaPrimary }}
        </button>
        <button class="btn-secondary" (click)="scrollToSection('contacto')">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M8.625 12a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H8.25m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0H12m4.125 0a.375.375 0 1 1-.75 0 .375.375 0 0 1 .75 0Zm0 0h-.375M21 12c0 4.556-4.03 8.25-9 8.25a9.764 9.764 0 0 1-2.555-.337A5.972 5.972 0 0 1 5.41 20.97a5.969 5.969 0 0 1-.474-.065 4.48 4.48 0 0 0 .978-2.025c.09-.457-.133-.901-.467-1.226C3.93 16.178 3 14.189 3 12c0-4.556 4.03-8.25 9-8.25s9 3.694 9 8.25Z" />
          </svg>
          {{ hero.ctaSecondary }}
        </button>
      </div>
    </div>

    <!-- Hero Image -->
    <div class="hero-image">
      <div class="hero-image-container">
        <div class="image-wrapper">
          <!-- Persistent dual-layer crossfade -->
          <img
            [src]="layerSrc()[0]"
            alt="Hero imagen"
            class="service-image carousel-layer"
            [class.active]="activeLayer() === 0"
          />
          <img
            [src]="layerSrc()[1]"
            alt="Hero imagen"
            class="service-image carousel-layer"
            [class.active]="activeLayer() === 1"
          />
          <div class="image-overlay"></div>
        </div>
        <!-- Floating stats -->
        @if (leftStat(); as stat) {
          <div class="floating-stat stat-1">
            <span class="stat-number">{{ withPlus(stat.value) }}</span>
            <span class="stat-label">Servicios</span>
          </div>
        }
        @if (rightStat(); as stat) {
          <div class="floating-stat stat-2">
            <span class="stat-number">
              {{ stat.value }}
              <svg class="stat-star-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                <path d="M11.48 3.499a.562.562 0 0 1 1.04 0l2.125 5.111a.563.563 0 0 0 .475.345l5.518.442c.499.04.701.663.322.988l-4.204 3.602a.563.563 0 0 0-.182.557l1.285 5.385a.562.562 0 0 1-.84.61l-4.725-2.885a.562.562 0 0 0-.586 0L6.982 20.54a.562.562 0 0 1-.84-.61l1.285-5.386a.562.562 0 0 0-.182-.557l-4.204-3.602a.562.562 0 0 1 .322-.988l5.518-.442a.563.563 0 0 0 .475-.345L11.48 3.5Z" />
              </svg>
            </span>
          </div>
        }
      </div>
    </div>
  </div>
</section>
