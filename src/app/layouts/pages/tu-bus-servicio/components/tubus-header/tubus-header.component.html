<header class="header">
  <div class="header-container">
    <!-- Logo y Zona (Izquierda) -->
    <div class="header-left">
      <!-- Flecha volver (solo en perfil) -->
      @if (isProfilePage()) {
        <a routerLink="/" class="back-arrow" title="Volver">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5 3 12m0 0 7.5-7.5M3 12h18" />
          </svg>
        </a>
      }

      <!-- Logo -->
      <a routerLink="/" class="logo-link">
        <div class="logo-icon">
          <img src="assets/icons/autobus.png" alt="TuBus Express">
        </div>
        <span class="logo-text">TuBus<span class="logo-accent">Express</span></span>
      </a>

      <!-- Separador -->
      <div class="header-divider"></div>

      <!-- Selector de Zona (Ciudad + Municipio) -->
      <button
        type="button"
        class="zone-button"
        (click)="openZoneModal()"
      >
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="zone-icon">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
        </svg>
        @if (zoneService.hasSelection()) {
          <span class="zone-text">{{ zoneService.selectedCity()!.name }}, {{ zoneService.selectedMunicipality()!.name }}</span>
        }
      </button>
    </div>

    <!-- Acciones (Derecha) -->
    <div class="header-right">
      <!-- Botón de cambio de tema -->
      <app-theme-toggle />

      <!-- Carrito de compras (solo si está logueado y tiene zona seleccionada) -->
      @if (isLoggedIn() && zoneService.hasSelection()) {
        <app-cart-popover />
      }

      <!-- Botón Login o Menú de Usuario -->
      @if (isLoggedIn()) {
        <app-user-menu />
      } @else {
        <button
          type="button"
          class="login-btn"
          (click)="onLoginClick()"
        >
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="login-icon">
            <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 6a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0ZM4.501 20.118a7.5 7.5 0 0 1 14.998 0A17.933 17.933 0 0 1 12 21.75c-2.676 0-5.216-.584-7.499-1.632Z" />
          </svg>
          <span class="login-text">Ingresar</span>
        </button>
      }
    </div>
  </div>
</header>

<!-- Modal de Autenticación -->
@if (isAuthModalOpen()) {
  <app-auth-modal (closeModal)="closeAuthModal()" />
}
